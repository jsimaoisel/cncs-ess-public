name: SBOM generation (app and image)
on:
  workflow_dispatch:

env:
  # Use docker.io for Docker Hub
  REGISTRY: ghcr.io
  # github.repository as <account>/<repo>
  IMAGE_NAME: ${{ github.repository }}

jobs:
  sbom-app:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
      id-token: write
      
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      # SBOM (Maven / CycloneDX) + Sign
      - name: Generate SBOM (Application)
        run: mvn -B org.cyclonedx:cyclonedx-maven-plugin:2.8.0:makeAggregateBom

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign SBOM Application
        run: |
          cosign sign-blob \
            --yes \
            target/bom.json \
            --output-signature sbom-application.sig \
            --output-certificate sbom-application.crt

      - name: Upload SBOM Application (+sig +crt)
        uses: actions/upload-artifact@v4
        with:
          name: sbom-application
          path: |
            target/bom.json
            sbom-application.sig
            sbom-application.crt

  sbom-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
      
      # Build for AMD64 (to generate SBOM)
      - name: Build Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64
          push: true
      
      - name: Generate SBOM (Docker image)
        uses: aquasecurity/trivy-action@0.33.1
        with:
          image-ref: ${{ steps.meta.outputs.tags }}
          format: cyclonedx
          output: sbom-image.cdx.json

      - name: Sign SBOM Docker Image
        run: |
          cosign sign-blob \
            --yes \
            sbom-image.cdx.json \
            --output-signature sbom-image.sig \
            --output-certificate sbom-image.crt

      - name: Upload SBOM Image (+sig +crt)
        uses: actions/upload-artifact@v4
        with:
          name: sbom-image
          path: |
            sbom-image.cdx.json
            sbom-image.sig
            sbom-image.crt
            
      # -------------------------
      # PROVENANCE (SLSA)
      # -------------------------
      - name: Generate provenance predicate
        run: |
          cat <<EOF > provenance.json
          {
            "_type": "https://in-toto.io/Statement/v0.1",
            "subject": [
              {
                "name": "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}",
                "digest": {
                  "sha256": "${{ steps.build.outputs.digest }}"
                }
              }
            ],
            "predicateType": "https://slsa.dev/provenance/v0.2",
            "predicate": {
              "builder": {
                "id": "https://github.com/${{ github.repository }}/actions"
              },
              "buildType": "https://github.com/docker/build-push-action",
              "invocation": {
                "configSource": {
                  "uri": "https://github.com/${{ github.repository }}",
                  "digest": {
                    "sha1": "${{ github.sha }}"
                  }
                }
              },
              "metadata": {
                "buildInvocationId": "${{ github.run_id }}"
              }
            }
          }
          EOF


      # -------------------------
      # Assinar PROVENANCE
      # -------------------------
      - name: Attest provenance
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}"
      
          echo "Attesting $IMAGE"
      
          cosign attest --yes \
            --predicate provenance.json \
            --type slsaprovenance \
            "$IMAGE"

