name: SBOM generation (app and image)
on:
  workflow_dispatch:

env:
  # Use docker.io for Docker Hub
  REGISTRY: ghcr.io
  # github.repository as <account>/<repo>
  IMAGE_NAME: ${{ github.repository }}

jobs:
  sbom-app:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
      id-token: write
      
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      # SBOM (Maven / CycloneDX) + Sign
      - name: Generate SBOM (Application)
        run: mvn -B org.cyclonedx:cyclonedx-maven-plugin:2.8.0:makeAggregateBom

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign SBOM Application
        run: |
          cosign sign-blob \
            --yes \
            target/bom.json \
            --output-signature sbom-aplication.sig \
            --output-certificate sbom-aplication.crt

      - name: Upload SBOM Application (+sig +crt)
        uses: actions/upload-artifact@v4
        with:
          name: sbom-application
          path: |
            target/bom.json
            sbom-aplication.sig
            sbom-application.crt

  sbom-image:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

      
      # Build for AMD64 (to generate SBOM)
      - name: Build Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64
          push: false
          load: true
      
      - name: Generate SBOM (Docker image)
        uses: aquasecurity/trivy-action@0.33.1
        with:
          image-ref: ${{ steps.meta.outputs.tags }}
          format: cyclonedx
          output: sbom-image.cdx.json

      - name: Sign SBOM Docker Image
        run: |
          cosign sign-blob \
            --yes \
            sbom-image.cdx.json \
            --output-signature sbom-image.sig \
            --output-certificate sbom-image.crt

      - name: Upload SBOM Image (+sig +crt)
        uses: actions/upload-artifact@v4
        with:
          name: sbom-application
          path: |
            target/bom.json
            sbom-image.sig
            sbom-image.crt
