name: Build Pipeline Lab1

on:
  push:
  workflow_dispatch:

jobs:
  security-scan:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
      
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      # Testes unitários
      - name: Build e testes (JUnit)
        run: mvn clean verify

      # CodeQL
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: java
          
      - name: Build for CodeQL Analysis
        run: |
          mvn clean compile
          
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4

      # Scan de segredos
      - name: Scan secrets
        uses: aquasecurity/trivy-action@0.20.0
        with:
          scan-type: fs
          scanners: secret
          exit-code: 1
          format: sarif
          output: trivy-secrets.sarif

      # Scan de dependências
      - name: Scan dependencies
        uses: aquasecurity/trivy-action@0.20.0
        with:
          scan-type: fs
          severity: CRITICAL,HIGH
          exit-code: 1
          format: sarif
          output: trivy.sarif

      - name: Upload SARIF
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy.sarif

      - name: Upload SARIF (dependencies)
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy.sarif

      - uses: actions/upload-artifact@v4
        with:
          name: trivy-results
          path: |
            trivy.sarif
            trivy-secrets.sarif

  build-jar:
    needs: security-scan
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
      
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'
          
      - name: Build with Maven
        run: |
          mvn clean package
          
      - name: Upload JAR artifacts
        uses: actions/upload-artifact@v4
        with:
          name: lab1-artifacts
          path: target/*.jar
